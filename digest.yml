name: SF Fillmore Research Report

on:
  workflow_dispatch:  # Manual trigger only — run once when you want the report

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate and post report
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Pull everything back to 2018 by default.
          # Override this in the Actions UI if you want a different start date.
          SINCE_DATE: "2018-01-01"
        run: node src/digest.js
